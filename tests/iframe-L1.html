<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iframe L1 - Context Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 15px;
      background: #0f0f1a;
      color: #eee;
    }

    .context-layer {
      border: 2px solid #e94560;
      border-radius: 8px;
      padding: 15px;
      background: rgba(233, 69, 96, 0.05);
    }

    h2 {
      margin: 0 0 10px 0;
      color: #e94560;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h2 .badge {
      background: #e94560;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }

    .form-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 6px 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a2e;
      color: #eee;
      font-size: 13px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    .form-group textarea {
      min-height: 50px;
      resize: vertical;
    }

    .checkbox-group {
      flex-direction: row;
      align-items: center;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }

    .state-display {
      margin-top: 12px;
      padding: 8px;
      background: #1a1a2e;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
    }

    .state-display .label {
      color: #888;
      margin-bottom: 4px;
    }

    .state-display .value {
      color: #e94560;
      word-break: break-all;
    }

    button {
      padding: 6px 12px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
      margin-right: 8px;
      margin-top: 8px;
    }

    button:hover {
      background: #d13a54;
    }

    button.secondary {
      background: #4ec9b0;
      color: #1a1a2e;
    }

    .shadow-host {
      border: 2px dashed #9d4edd;
      border-radius: 8px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="context-layer" data-context="iframe-L1" data-layer="2">
    <h2>
      <span class="badge">L2</span>
      Iframe Context (Level 1) - Inside Shadow L1
    </h2>

    <div class="form-section">
      <div class="form-group">
        <label>Text Input (L2)</label>
        <input type="text" id="input-L2-text" data-testid="input-L2-text" placeholder="Enter text...">
      </div>

      <div class="form-group">
        <label>Email (L2)</label>
        <input type="email" id="input-L2-email" data-testid="input-L2-email" placeholder="email@example.com">
      </div>

      <div class="form-group">
        <label>Number (L2)</label>
        <input type="number" id="input-L2-number" data-testid="input-L2-number" placeholder="0" value="0">
      </div>

      <div class="form-group">
        <label>Select (L2)</label>
        <select id="input-L2-select" data-testid="input-L2-select">
          <option value="">-- Select --</option>
          <option value="option-a">Option A</option>
          <option value="option-b">Option B</option>
          <option value="option-c">Option C</option>
        </select>
      </div>

      <div class="form-group checkbox-group">
        <input type="checkbox" id="input-L2-checkbox" data-testid="input-L2-checkbox">
        <label for="input-L2-checkbox">Checkbox (L2)</label>
      </div>

      <div class="form-group">
        <label>Textarea (L2)</label>
        <textarea id="input-L2-textarea" data-testid="input-L2-textarea" placeholder="Enter multi-line text..."></textarea>
      </div>
    </div>

    <div class="state-display">
      <div class="label">Current State:</div>
      <div class="value" id="state-L2">-</div>
    </div>

    <button id="reset-L2">Reset L2 Form</button>
    <button id="fill-L2" class="secondary">Fill Test Data</button>
  </div>

  <!-- Shadow DOM L2 inside Iframe L1 -->
  <div id="shadow-host-L2" class="shadow-host"></div>

  <script>
    // =========================================================================
    // Utility Functions (same as parent)
    // =========================================================================

    function getFormState(layer, root = document) {
      const prefix = `input-L${layer}-`;
      const state = {};

      const text = root.querySelector(`[data-testid="${prefix}text"]`);
      const email = root.querySelector(`[data-testid="${prefix}email"]`);
      const number = root.querySelector(`[data-testid="${prefix}number"]`);
      const select = root.querySelector(`[data-testid="${prefix}select"]`);
      const checkbox = root.querySelector(`[data-testid="${prefix}checkbox"]`);
      const textarea = root.querySelector(`[data-testid="${prefix}textarea"]`);

      if (text) state.text = text.value;
      if (email) state.email = email.value;
      if (number) state.number = number.value;
      if (select) state.select = select.value;
      if (checkbox) state.checkbox = checkbox.checked;
      if (textarea) state.textarea = textarea.value;

      return state;
    }

    function updateStateDisplay(layer, root = document) {
      const state = getFormState(layer, root);
      const display = root.querySelector(`#state-L${layer}`);
      if (display) {
        display.textContent = JSON.stringify(state, null, 2);
      }
    }

    function resetForm(layer, root = document) {
      const prefix = `input-L${layer}-`;

      const text = root.querySelector(`[data-testid="${prefix}text"]`);
      const email = root.querySelector(`[data-testid="${prefix}email"]`);
      const number = root.querySelector(`[data-testid="${prefix}number"]`);
      const select = root.querySelector(`[data-testid="${prefix}select"]`);
      const checkbox = root.querySelector(`[data-testid="${prefix}checkbox"]`);
      const textarea = root.querySelector(`[data-testid="${prefix}textarea"]`);

      if (text) text.value = '';
      if (email) email.value = '';
      if (number) number.value = '0';
      if (select) select.value = '';
      if (checkbox) checkbox.checked = false;
      if (textarea) textarea.value = '';

      updateStateDisplay(layer, root);
    }

    function fillWithTestData(layer, root = document) {
      const prefix = `input-L${layer}-`;

      const text = root.querySelector(`[data-testid="${prefix}text"]`);
      const email = root.querySelector(`[data-testid="${prefix}email"]`);
      const number = root.querySelector(`[data-testid="${prefix}number"]`);
      const select = root.querySelector(`[data-testid="${prefix}select"]`);
      const checkbox = root.querySelector(`[data-testid="${prefix}checkbox"]`);
      const textarea = root.querySelector(`[data-testid="${prefix}textarea"]`);

      if (text) text.value = `TestValue-L${layer}`;
      if (email) email.value = `test-L${layer}@example.com`;
      if (number) number.value = String(layer * 100 + 42);
      if (select) select.value = ['option-a', 'option-b', 'option-c'][layer % 3];
      if (checkbox) checkbox.checked = layer % 2 === 0;
      if (textarea) textarea.value = `Multi-line text for Layer ${layer}\nLine 2\nLine 3`;

      updateStateDisplay(layer, root);
    }

    // Expose globally
    window.getFormState = getFormState;
    window.updateStateDisplay = updateStateDisplay;
    window.resetForm = resetForm;
    window.fillWithTestData = fillWithTestData;

    // =========================================================================
    // Setup L2 (this iframe's main content)
    // =========================================================================

    document.querySelectorAll('[data-testid^="input-L2-"]').forEach(el => {
      el.addEventListener('input', () => updateStateDisplay(2));
      el.addEventListener('change', () => updateStateDisplay(2));
    });

    document.getElementById('reset-L2').addEventListener('click', () => resetForm(2));
    document.getElementById('fill-L2').addEventListener('click', () => fillWithTestData(2));

    updateStateDisplay(2);

    // =========================================================================
    // Create Shadow DOM L2 inside this iframe
    // =========================================================================

    const shadowHostL2 = document.getElementById('shadow-host-L2');
    const shadowRootL2 = shadowHostL2.attachShadow({ mode: 'open' });

    shadowRootL2.innerHTML = `
      <style>
        :host {
          display: block;
          padding: 12px;
          background: rgba(157, 78, 221, 0.05);
        }

        .context-layer {
          border: 2px solid #9d4edd;
          border-radius: 8px;
          padding: 12px;
          background: rgba(157, 78, 221, 0.1);
        }

        h2 {
          margin: 0 0 8px 0;
          color: #9d4edd;
          font-size: 14px;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        h2 .badge {
          background: #9d4edd;
          color: #1a1a2e;
          padding: 2px 6px;
          border-radius: 4px;
          font-size: 11px;
          font-weight: bold;
        }

        .form-section {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
          gap: 10px;
          margin-top: 8px;
        }

        .form-group {
          display: flex;
          flex-direction: column;
          gap: 3px;
        }

        .form-group label {
          font-size: 10px;
          color: #888;
          text-transform: uppercase;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
          padding: 5px 8px;
          border: 1px solid #333;
          border-radius: 4px;
          background: #0f0f1a;
          color: #eee;
          font-size: 12px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
          outline: none;
          border-color: #9d4edd;
        }

        .form-group textarea {
          min-height: 40px;
          resize: vertical;
        }

        .checkbox-group {
          flex-direction: row;
          align-items: center;
        }

        .checkbox-group input[type="checkbox"] {
          width: 14px;
          height: 14px;
        }

        .state-display {
          margin-top: 10px;
          padding: 6px;
          background: #0f0f1a;
          border-radius: 4px;
          font-family: monospace;
          font-size: 10px;
        }

        .state-display .label {
          color: #888;
          margin-bottom: 3px;
        }

        .state-display .value {
          color: #9d4edd;
          word-break: break-all;
        }

        button {
          padding: 5px 10px;
          background: #9d4edd;
          color: #fff;
          border: none;
          border-radius: 4px;
          cursor: pointer;
          font-weight: bold;
          font-size: 11px;
          margin-right: 6px;
          margin-top: 6px;
        }

        button:hover {
          background: #8b3dc9;
        }

        button.secondary {
          background: #e94560;
        }

        iframe {
          width: 100%;
          border: 2px dashed #e94560;
          border-radius: 8px;
          background: #050510;
          min-height: 300px;
          margin-top: 12px;
        }
      </style>

      <div class="context-layer" data-context="shadow-L2" data-layer="3">
        <h2>
          <span class="badge">L3</span>
          Shadow DOM (Level 2) - Inside Iframe L1
        </h2>

        <div class="form-section">
          <div class="form-group">
            <label>Text Input (L3)</label>
            <input type="text" id="input-L3-text" data-testid="input-L3-text" placeholder="Enter text...">
          </div>

          <div class="form-group">
            <label>Email (L3)</label>
            <input type="email" id="input-L3-email" data-testid="input-L3-email" placeholder="email@example.com">
          </div>

          <div class="form-group">
            <label>Number (L3)</label>
            <input type="number" id="input-L3-number" data-testid="input-L3-number" placeholder="0" value="0">
          </div>

          <div class="form-group">
            <label>Select (L3)</label>
            <select id="input-L3-select" data-testid="input-L3-select">
              <option value="">-- Select --</option>
              <option value="option-a">Option A</option>
              <option value="option-b">Option B</option>
              <option value="option-c">Option C</option>
            </select>
          </div>

          <div class="form-group checkbox-group">
            <input type="checkbox" id="input-L3-checkbox" data-testid="input-L3-checkbox">
            <label for="input-L3-checkbox">Checkbox (L3)</label>
          </div>

          <div class="form-group">
            <label>Textarea (L3)</label>
            <textarea id="input-L3-textarea" data-testid="input-L3-textarea" placeholder="Enter multi-line text..."></textarea>
          </div>
        </div>

        <div class="state-display">
          <div class="label">Current State:</div>
          <div class="value" id="state-L3">-</div>
        </div>

        <button id="reset-L3">Reset L3 Form</button>
        <button id="fill-L3" class="secondary">Fill Test Data</button>

        <!-- Deepest level: Iframe L2 inside Shadow L2 -->
        <iframe id="iframe-L2" src="iframe-L2.html"></iframe>
      </div>
    `;

    // Setup L3 event listeners
    const l3Root = shadowRootL2;
    l3Root.querySelectorAll('[data-testid^="input-L3-"]').forEach(el => {
      el.addEventListener('input', () => {
        const state = getFormState(3, l3Root);
        l3Root.getElementById('state-L3').textContent = JSON.stringify(state, null, 2);
      });
      el.addEventListener('change', () => {
        const state = getFormState(3, l3Root);
        l3Root.getElementById('state-L3').textContent = JSON.stringify(state, null, 2);
      });
    });

    l3Root.getElementById('reset-L3').addEventListener('click', () => {
      resetForm(3, l3Root);
    });

    l3Root.getElementById('fill-L3').addEventListener('click', () => {
      fillWithTestData(3, l3Root);
    });

    // Initial state
    const initState3 = getFormState(3, l3Root);
    l3Root.getElementById('state-L3').textContent = JSON.stringify(initState3, null, 2);

    // Expose shadow root for testing
    window.__shadowRootL2 = shadowRootL2;
  </script>
</body>
</html>
